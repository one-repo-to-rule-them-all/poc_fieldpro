# FieldPro Backend — Public POC Demo
# Fly.io app configuration
#
# Built from backend/Dockerfile on every deploy (no GHCR pre-built image).
app = "fieldpro-poc-backend"
primary_region = "dfw"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  WEB_CONCURRENCY = "4"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "30s"
    interval = "15s"
    method = "get"
    path = "/health"
    port = 8000
    timeout = "10s"
    type = "http"
