name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-lint:
    name: Backend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies (includes ruff, mypy, and all project deps)
        run: pip install -r backend/requirements-dev.txt

      - name: Run ruff
        run: cd backend && ruff check app

      - name: Run mypy
        run: cd backend && mypy app --ignore-missing-imports

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [backend-lint]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fieldpro_test
          POSTGRES_USER: fieldpro
          POSTGRES_PASSWORD: testpass
        ports:
          - '5432:5432'
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - '6379:6379'
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://fieldpro:testpass@localhost:5432/fieldpro_test
      DATABASE_TEST_URL: postgresql+asyncpg://fieldpro:testpass@localhost:5432/fieldpro_test
      DATABASE_SYNC_URL: postgresql://fieldpro:testpass@localhost:5432/fieldpro_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-prod
      REFRESH_SECRET_KEY: ci-refresh-key-not-for-prod
      ENVIRONMENT: test
      ALLOWED_HOSTS: "*"
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dev dependencies
        run: pip install -r backend/requirements-dev.txt

      - name: Run migrations
        run: cd backend && alembic upgrade head

      - name: Run tests with coverage
        # Gate set to 55% temporarily — real coverage is 58% now that
        # the test infra (#106) reliably runs all 131 tests. The 70%
        # target from the testing-infrastructure scoping doc returns
        # once that work lands. See #60.
        run: cd backend && pytest tests/ --cov=app --cov-report=xml --cov-fail-under=55

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: backend/coverage.xml
          flags: backend
          fail_ci_if_error: false

  frontend-lint:
    name: Frontend Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run ESLint
        run: cd frontend && npm run lint

      - name: Run TypeScript type check
        run: cd frontend && npm run type-check

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [frontend-lint]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run Vitest with coverage
        run: cd frontend && npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: frontend/coverage/lcov.info
          flags: frontend
          fail_ci_if_error: false

  e2e:
    name: End-to-End Tests
    needs: [backend-test, frontend-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create minimal .env for docker compose
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=fieldpro
          POSTGRES_PASSWORD=fieldpro_secret
          POSTGRES_DB=fieldpro
          REDIS_PASSWORD=redis_secret
          SECRET_KEY=ci-secret-key-not-for-prod
          REFRESH_SECRET_KEY=ci-refresh-key-not-for-prod
          ENVIRONMENT=test
          ACCESS_TOKEN_EXPIRE_MINUTES=30
          REFRESH_TOKEN_EXPIRE_DAYS=7
          NEXT_PUBLIC_API_URL=http://localhost:8000
          EOF

      - name: Start services
        run: docker compose up -d --wait --wait-timeout 180 backend frontend

      - name: Verify backend health
        run: |
          for i in $(seq 1 12); do
            if curl --silent --fail http://localhost:8000/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i: backend not ready yet, retrying in 5s..."
            sleep 5
          done
          echo "Backend never became healthy"
          docker compose logs backend
          exit 1

      - name: Seed demo data
        run: docker compose run --rm backend python scripts/seed_data.py

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Install Playwright browsers (chromium only)
        run: cd frontend && npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: cd frontend && npx playwright test --timeout=60000
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:8000
          CI: '1'

      - name: Dump backend logs on failure
        if: failure()
        run: docker compose logs backend frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces / videos
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-traces
          path: frontend/test-results/
          retention-days: 7
