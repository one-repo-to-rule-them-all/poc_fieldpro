name: Deploy

# Deploy the public POC demo to Fly.io on every push to main.
# Fly builds both images from their Dockerfiles — no GHCR pre-build step.
#
# Required GitHub secret: FLY_API_TOKEN
#   Create with: flyctl tokens create deploy --app fieldpro-poc-backend
#                (and the same for fieldpro-poc, or use one org-wide token)
#
# Required repo variable (or hard-code): BACKEND_URL
#   The frontend bakes this into the JS bundle. Defaults to fieldpro-poc-backend.fly.dev.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      BACKEND_URL: ${{ vars.BACKEND_URL || 'https://fieldpro-poc-backend.fly.dev' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy backend
        run: |
          flyctl deploy \
            --config fly.toml \
            --app fieldpro-poc-backend \
            --strategy rolling \
            --wait-timeout 600

      - name: Run database migrations
        run: |
          flyctl ssh console \
            --app fieldpro-poc-backend \
            -C "alembic upgrade head"

      - name: Deploy frontend
        run: |
          flyctl deploy \
            --config fly.frontend.toml \
            --app fieldpro-poc \
            --build-arg "NEXT_PUBLIC_API_URL=${BACKEND_URL}" \
            --strategy rolling \
            --wait-timeout 600

      - name: Smoke test
        run: |
          sleep 10
          curl --fail --retry 5 --retry-delay 5 \
            "${BACKEND_URL}/health"
          echo "Demo smoke test passed."

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Demo deployment — ${{ job.status }}"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Backend:** ${BACKEND_URL}"
            echo "- **Frontend:** https://fieldpro-poc.fly.dev"
            echo "- **Actor:** ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
