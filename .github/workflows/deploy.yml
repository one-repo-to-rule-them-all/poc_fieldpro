name: Deploy

# Deploy the public POC demo to Fly.io on every push to main.
# Fly builds both images from their Dockerfiles — no GHCR pre-build step.
#
# Required GitHub secret: FLY_API_TOKEN
#   Create with: flyctl tokens create deploy --app fieldpro-poc-backend
#                (and the same for fieldpro-poc, or use one org-wide token)
#
# Required repo variable (or hard-code): BACKEND_URL
#   The frontend bakes this into the JS bundle. Defaults to fieldpro-poc-backend.fly.dev.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      BACKEND_URL: ${{ vars.BACKEND_URL || 'https://fieldpro-poc-backend.fly.dev' }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      # Fly's "Checking health" spinner is sticky after rolling deploys —
      # it sometimes refuses to flip to passing even when the new machine
      # is serving 200s. We bound the wait short (120s vs the default 600)
      # and let the step go yellow on timeout. The Smoke Test step below
      # is the real source of truth for deploy success.
      - name: Deploy backend
        working-directory: backend
        continue-on-error: true
        run: |
          flyctl deploy \
            --app fieldpro-poc-backend \
            --strategy rolling \
            --wait-timeout 120

      - name: Run database migrations
        run: |
          flyctl ssh console \
            --app fieldpro-poc-backend \
            -C "alembic upgrade head"

      - name: Deploy frontend
        working-directory: frontend
        continue-on-error: true
        run: |
          flyctl deploy \
            --app fieldpro-poc \
            --build-arg "NEXT_PUBLIC_API_URL=${BACKEND_URL}" \
            --strategy rolling \
            --wait-timeout 120

      # Source of truth for the workflow: if /health returns 200, the
      # deploy succeeded regardless of whether the flyctl deploy spinner
      # was happy. Retries 10x with 5s delay = 50s tolerance for a new
      # machine to bind to :8000.
      - name: Smoke test
        run: |
          sleep 10
          curl --fail --retry 10 --retry-delay 5 --retry-all-errors \
            "${BACKEND_URL}/health"
          echo "Demo smoke test passed."
          curl --fail --retry 10 --retry-delay 5 --retry-all-errors \
            "https://fieldpro-poc.fly.dev/login" -o /dev/null
          echo "Frontend smoke test passed."

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Demo deployment — ${{ job.status }}"
            echo "- **Commit:** \`${{ github.sha }}\`"
            echo "- **Backend:** ${BACKEND_URL}"
            echo "- **Frontend:** https://fieldpro-poc.fly.dev"
            echo "- **Actor:** ${{ github.actor }}"
          } >> "$GITHUB_STEP_SUMMARY"
