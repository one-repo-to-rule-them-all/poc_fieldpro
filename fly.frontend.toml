# FieldPro Frontend — Public POC Demo
#
# NEXT_PUBLIC_API_URL is baked into the Next.js bundle at build time, so it
# must be passed as a --build-arg on every deploy, not set here as a runtime env:
#
#   flyctl deploy -c fly.frontend.toml \
#     --build-arg NEXT_PUBLIC_API_URL=https://fieldpro-poc-backend.fly.dev \
#     --app fieldpro-poc
app = "fieldpro-poc"
primary_region = "dfw"

[env]
  PORT = "3000"
  NODE_ENV = "production"
  NEXT_TELEMETRY_DISABLED = "1"
  NEXT_PUBLIC_APP_NAME = "FieldPro Demo"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[checks]
  [checks.health]
    grace_period = "20s"
    interval = "15s"
    method = "get"
    path = "/"
    port = 3000
    timeout = "10s"
    type = "http"
