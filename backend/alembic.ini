# Alembic Configuration File

[alembic]
# Path to migration scripts
script_location = migrations

# Add the project root to sys.path so `from app.X import Y` works
prepend_sys_path = .

# Template for migration filenames
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# Timezone for the generated revision dates
timezone = UTC

# Max length of slug in migration filenames
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file to be detected
sourceless = false

# Version location specification - comma-separated list for multiple directories
version_locations = %(here)s/migrations/versions

# The output encoding used when revision files are written from script.py.mako
output_encoding = utf-8

# Database URL — overridden at runtime from environment variables in env.py
sqlalchemy.url = postgresql+asyncpg://fieldpro:fieldpro_secret@localhost:5432/fieldpro


[post_write_hooks]
# Post-write hooks — run ruff format on each new revision
# hooks = ruff
# ruff.type = exec
# ruff.executable = ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
